name: V2Ray Server

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ===== الخلية الأولى: تحميل الأدوات =====
      - name: Download Xray
        run: |
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          sudo unzip -qo xray.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          rm -f xray.zip

      - name: Download Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Install Python dependencies
        run: pip install -q huggingface_hub

      # ===== الخلية الثانية: التشغيل + التحديث التلقائي =====
      - name: Start V2Ray and update HuggingFace
        env:
          CLIENT_UUID: ${{ secrets.CLIENT_UUID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python3 << 'SCRIPT'
          import os, subprocess, json, time, re

          CLIENT_UUID = os.environ["CLIENT_UUID"]
          PORT = 8080
          HF_TOKEN = os.environ["HF_TOKEN"]
          HF_SPACE = os.environ["HF_SPACE"]

          # إنشاء ملف إعدادات Xray — loglevel = none عشان ما يطبع أي حاجة
          config = {
              "log": {"loglevel": "none"},
              "inbounds": [{"port": PORT, "protocol": "vless",
                  "settings": {"clients": [{"id": CLIENT_UUID}], "decryption": "none"},
                  "streamSettings": {"network": "ws", "wsSettings": {"path": "/v2ray"}}}],
              "outbounds": [{"protocol": "freedom"}]
          }
          with open("config.json", "w") as f:
              json.dump(config, f)

          # تشغيل Xray — كل الـ output يروح /dev/null
          print("🚀 Starting...", flush=True)
          xray_process = subprocess.Popen(
              ["/usr/local/bin/xray", "run", "-config", "config.json"],
              stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          # تشغيل Cloudflare Tunnel — نقرأ الـ output مؤقتاً فقط لاستخراج الرابط
          cf_process = subprocess.Popen(
              ["./cloudflared", "tunnel", "--url", f"http://localhost:{PORT}"],
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)

          # استخراج رابط النفق
          tunnel_url = ""
          for _ in range(60):
              line = cf_process.stdout.readline()
              if not line:
                  break
              match = re.search(r'(https://[a-zA-Z0-9-]+\.trycloudflare\.com)', line)
              if match:
                  tunnel_url = match.group(1)
                  break

          if tunnel_url:
              domain_only = tunnel_url.replace("https://", "")

              # تحديث HuggingFace تلقائياً
              try:
                  from huggingface_hub import HfApi
                  api = HfApi(token=HF_TOKEN)
                  api.add_space_secret(HF_SPACE, "TARGET_URL", domain_only)
                  print("✅ Done", flush=True)
              except Exception as e:
                  print(f"⚠️ Update failed", flush=True)
          else:
              print("❌ Failed", flush=True)
              exit(1)

          # إغلاق قراءة output الـ cloudflared عشان ما يطبع أي حاجة تاني
          cf_process.stdout.close()

          # إبقاء العملية شغالة — بدون أي طباعة
          try:
              while True:
                  time.sleep(60)
          except KeyboardInterrupt:
              xray_process.terminate()
              cf_process.terminate()
          SCRIPT
